name = "dragline3d"
pages_build_output_dir = ".vercel/output/static"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = [
  "0 10 * * 1",    # Weekly report: every Monday at 10am UTC (6am EST)
  "0 10 1 * *",    # Monthly report: 1st of every month at 10am UTC
]
