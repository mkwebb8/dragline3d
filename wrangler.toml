name = "dragline3d"
main = "./worker.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "dragline3d"

# Cron triggers (Shippo poll every hour, weekly/monthly reports)
[triggers]
crons = ["0 * * * *", "0 10 * * 1", "0 10 1 * *"]
